<!doctype html>
<html>
<head>
  <title>Battery State Management</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>

function createTable() {
    const container = document.getElementById("table");
    container.innerHTML = ""; // Clear previous content

    for (let seg = 1; seg <= N_SEGMENTS; seg++) {
        const table = document.createElement("table");
        table.border = "1";
        table.style.borderCollapse = "collapse";
        table.style.marginBottom = "20px";
        table.style.width = "100%";

        // Segment header row
        const headerRow = document.createElement("tr");
        const headerCell = document.createElement("td");
        headerCell.colSpan = N_GROUPS + 2;
        headerCell.textContent = `Segment ${seg}`;
        headerCell.style.fontWeight = "bold";
        headerCell.style.textAlign = "left";
        headerCell.style.backgroundColor = "#ddd";
        headerCell.style.padding = "8px";
        table.appendChild(headerRow).appendChild(headerCell);

        for (let mon = 1; mon <= N_MONITORS_PER_SEG; mon++) {
            const voltageRow = document.createElement("tr");
            const tempRow = document.createElement("tr");

            // Monitor column
            const monitorCell = document.createElement("td");
            monitorCell.rowSpan = 2;
            monitorCell.textContent = `Monitor ${mon}`;
            monitorCell.style.fontWeight = "bold";
            monitorCell.style.padding = "6px";
            monitorCell.style.width = "100px"; // Reduced width
            voltageRow.appendChild(monitorCell);

            // Voltage label column
            const voltageLabel = document.createElement("td");
            voltageLabel.textContent = "Volts";
            voltageLabel.style.fontWeight = "bold";
            voltageLabel.style.padding = "6px";
            voltageLabel.style.width = "80px"; // Reduced width
            voltageRow.appendChild(voltageLabel);

            // Voltage cells
            for (let i = 1; i <= N_GROUPS; i++) {
                const vCell = document.createElement("td");
                vCell.id = `v_${seg}_${mon}_${i}`;
                vCell.textContent = `V${i}`;
                vCell.style.padding = "6px";
                voltageRow.appendChild(vCell);
            }

            // Temp label column
            const tempLabel = document.createElement("td");
            tempLabel.textContent = "Temp";
            tempLabel.style.fontWeight = "bold";
            tempLabel.style.padding = "6px";
            tempLabel.style.width = "80px"; // Reduced width
            tempRow.appendChild(tempLabel);

            // Temp cells
            for (let i = 1; i <= N_GROUPS; i++) {
                const tCell = document.createElement("td");
                if (i <= N_TEMPS) {
                    tCell.id = `t_${seg}_${mon}_${i}`;
                    tCell.textContent = `T${i}`;
                }
                tCell.style.padding = "6px";
                tempRow.appendChild(tCell);
            }

            table.appendChild(voltageRow);
            table.appendChild(tempRow);
        }

        container.appendChild(table);
    }
}


  </script>
  <style>
   
  </style>
</head>
<body>
  <h2>Live Serial Monitor</h2>
  <div id="table"></div>

  <script>

    const N_SEGMENTS = 1
    const N_MONITORS_PER_SEG = 2
    const N_GROUPS = 10
    const N_TEMPS = 8

    createTable();

    const stack = [];
    for (var i = 0; i < N_SEGMENTS; i++)
    {
        stack.push([])
        for (var j = 0; j < N_MONITORS_PER_SEG; j++)
        {
            stack[i].push({
                't': [],
                'v': []
            })
            for (var k = 0; k < N_GROUPS; k++)
            {
                stack[i][j]['v'].push(0)
            }
             for (var k = 0; k < N_TEMPS; k++)
            {
                stack[i][j]['t'].push(0)
            }
        }
    }

    const socket = io();
    socket.on('stackupdate', (data) => {
        stack[data.segment][data.monitor][data.type][data.item] = data.val;
        // let id = `${data.type}_${data.segment}_${data.segment}_${data.item}`
        // document.getElementById(id).innerHTML = data.val;
    });

    
    setInterval(() => {
        for (var i = 0; i < N_SEGMENTS; i++)
        {
            for (var j = 0; j < N_MONITORS_PER_SEG; j++)
            {
                for (var k = 0; k < N_GROUPS; k++)
                {
                    document.getElementById(`v_${i+1}_${j+1}_${k+1}`).innerHTML = stack[i][j]['v'][k];
                }
                for (var k = 0; k < N_TEMPS; k++)
                {
                    document.getElementById(`t_${i+1}_${j+1}_${k+1}`).innerHTML = stack[i][j]['t'][k];
                }
            }
        }
    }, 1000);

  </script>
</body>
</html>
