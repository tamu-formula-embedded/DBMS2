<!doctype html>
<html>
<head>
  <title>Serial Monitor</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      margin: 0;
      padding: 1rem;
      padding-bottom: 4rem; /* 👈 Add room at the bottom */
    }
    #console {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      height: 95vh;
      border: 1px solid #0f0;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <h2>Live Serial Monitor</h2>
  <div id="console"></div>

  <script>
    const MAX_LENGTH = 4096;
    const consoleDiv = document.getElementById('console');
    let buffer = '';

    function updateConsole(newText) {
      buffer += newText;
      if (buffer.length > MAX_LENGTH) {
        buffer = buffer.slice(buffer.length - MAX_LENGTH);
      }
      consoleDiv.textContent = buffer;
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    const socket = io();
    socket.on('data', (data) => updateConsole(data.ascii));
    socket.on('serial', (data) => updateConsole(data.ascii));
  </script>
</body>
</html>
